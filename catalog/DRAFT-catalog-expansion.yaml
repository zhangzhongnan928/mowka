# =====================================================================
# DRAFT — Pokémon TCG (AU) sealed-product price index: catalog expansion
# Pending review and approval by Simon. Do NOT publish without sign-off.
# NOT loaded by the pipeline: the live catalog is skus.yaml. To publish,
# Simon reviews, then this content replaces skus.yaml.
# ids are stable slugs (<series-prefix>-<set-slug>-<category>) and become
# PERMANENT on publish — rename only while in draft.
#
# Research date: July 2026. Covers TPCi international (English) products
# actively sold/traded in the Australian market.
# Conventions:
#   - category: one of etb, booster-box, booster-bundle, collection-box, tin, blister
#   - aliases: lowercase substrings for title matching (case-insensitive
#     substring, longest alias wins). All aliases are set-qualified to avoid
#     cross-set false matches; bare set names/numbers (e.g. "151") avoided.
#   - Black Bolt / White Flare keep the sv- prefix: they are official
#     "Scarlet & Violet" expansions and collectors use the full set names
#     (no bb-/wf- shorthand in common store-listing usage).
#   - Special sets (151, Paldean Fates, Shrouded Fable, Prismatic Evolutions,
#     Black Bolt, White Flare, Ascended Heroes) have NO standard booster box;
#     packs retail via booster bundles/ETBs — no booster-box SKU for them.
#   - Mega Evolution era adds "Enhanced Booster Box" (36 packs + stamped promo)
#     alongside the regular display.
#   - Pokemon Center-exclusive ETBs deliberately excluded (separate price tier,
#     not AU retail).
#   - Not yet included (unreleased as of draft): Storm Emerald (ME06, ~Sep 2026)
#     and the 30th Celebration anniversary set — add after release.
# =====================================================================
