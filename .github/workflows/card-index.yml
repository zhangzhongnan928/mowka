name: card-index
on:
  schedule:
    - cron: "13 19 * * 1"   # weekly, Tuesdays 05:13 AEST — new sets land slowly
  workflow_dispatch:
permissions:
  contents: write
  actions: write   # dispatch the pages deploy (GITHUB_TOKEN pushes don't trigger it)
concurrency:
  group: card-index
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ingest/requirements.txt
      - run: pip install -r ingest/requirements.txt
      - name: build identify index from TCGdex
        run: python scripts/build_card_index.py
      - name: commit index
        id: commit
        run: |
          git config user.name "mowka-bot"
          git config user.email "zhangzhongnan928@gmail.com"
          git add site/api/card-index.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "data: refresh card identify index"
            n=0; until git push; do n=$((n+1)); [ $n -ge 3 ] && exit 1; git pull --rebase || exit 1; done
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: deploy site (GITHUB_TOKEN pushes don't trigger pages.yml)
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run pages.yml --ref main
